name: docgen_vn
description: "A Vietnamese-language source-code documentation generator built for developers"
#publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5
  flutter: ^3.41.9

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Markdown rendering
  flutter_markdown: ^0.7.0
  markdown: ^7.2.0

  # Code highlighting (syntax highlight trong editor)
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # PDF export
  pdf: ^3.11.0
  printing: ^5.12.0

  # File pick & upload
  file_picker: ^8.0.0

  # Charts (Admin dashboard)
  fl_chart: ^0.68.0

  # Icons (Lucide-equivalent cho Flutter)
  lucide_icons: ^0.0.11

  # SVG support (logo)
  flutter_svg: ^2.0.10+1

  # Local storage (token auth, theme preference)
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0

  # Responsive layout
  flutter_adaptive_scaffold: ^0.2.0

  # Toasts / Snackbar
  toastification: ^2.1.0

  # Shimmer skeleton loading
  shimmer: ^3.0.0

  # Copy to clipboard
  clipboard: ^0.1.3

  # Intl / Vietnamese date format
  intl: ^0.19.0

  #cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  flutter_lints: ^6.0.0 #^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont.ttf
          weight: 100
          style: normal
        - asset: assets/fonts/Inter-VariableFont.ttf
          weight: 400
          style: normal
        - asset: assets/fonts/Inter-VariableFont.ttf
          weight: 500
          style: normal
        - asset: assets/fonts/Inter-VariableFont.ttf
          weight: 600
          style: normal
        - asset: assets/fonts/Inter-VariableFont.ttf
          weight: 700
          style: normal

    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
